<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<link id="favicon" rel="shortcut icon" type="image/png" href="data:image/png;base64,....==" />
	<style>
		li {display: inline;}
		ul {white-space: nowrap;}
		.upcoming {border: 1px solid yellow;}
		.played {border: 1px solid black;}
	</style>
</head>
<body></body>
<script type="module">
import mqtt_client from 'https://cdn.jsdelivr.net/npm/u8-mqtt/esm/web/index.js'
import * as msgpack_lite from 'https://esm.run/msgpack-lite'


const hasIterationProtocol = variable => variable !== null && Symbol.iterator in Object(variable)
function h(type, params, children) {
    const el = document.createElement(type)
    for (let [k,v] of Object.entries(params)) {el.setAttribute(k,v)}
    if      (["string","number"].indexOf(typeof(children))>=0) {el.appendChild(document.createTextNode(children))}
    else if (hasIterationProtocol(children)) {for (let c of children) {el.append(c)}}
    else if (children                      ) {el.appendChild(children)}
    return el
}


const my_mqtt = mqtt_client({on_live})
	.with_websock('ws://localhost:9001')  // or .with_tcp('tcp://test.mosquitto.org:1883')
	.with_autoreconnect(1000 * 5)
await my_mqtt.connect()

function render_playout_items(topic, payload) {
	return [
		h('li',{},`${topic.replace('/track/','')} ${payload.isPlayingTrack?'playingTrack':'presenter'}`),
		payload.playout_items.map(track=>h('li',{},[
			h('img',{
				src:track.artwork?.url || '',
				alt:track.title,
				loading: "lazy",
				'class': track.status=='C' ? 'upcoming':'played'
			},[]),
		])),
	].flat()
}

async function mqtt_track_message(pkt, params, ctx) {
	const data = msgpack_lite.decode(pkt.payload)
	const $target = document.getElementById(pkt.topic) || document.body.appendChild(h('ul',{id: pkt.topic}))
	$target.dataset.message_count = ($target.dataset.message_count | 0) + 1
	$target.innerHTML = ''
	$target.append(...render_playout_items(pkt.topic, data))
}

async function on_live(my_mqtt, is_reconnect) {
	console.log('on_live - subscribe to /tracks/#')
	my_mqtt.subscribe_topic('/track/#', mqtt_track_message)
}
</script>
</html>
